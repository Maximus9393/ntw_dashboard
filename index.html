  Object.assign(s1.getCell('E6'), { value: skTotal, font: F(PAL.amber, true, 28), fill: fill(PAL.amberLight), alignment: { vertical: 'middle', indent: 1 }, numFmt: NF.int });
  s1.mergeCells('E8:G8');
  Object.assign(s1.getCell('E8'), { value: 'případů ve vybraných hlavních benefitech', font: F(PAL.amber, false, 9), fill: fill(PAL.amberLight), alignment: { vertical: 'middle', indent: 1 } });
  for (let r = 5; r <= 8; r++) {
    for (const col of ['A','B','C','E','F','G']) s1.getCell(col + r).border = { top: thinBorder, bottom: thinBorder };
  }

  // Benefit table
  let row = 10;
  s1.mergeCells(`A${row}:G${row}`);
  Object.assign(s1.getCell(`A${row}`), { value: 'Souhrn po benefitech', font: F(PAL.text, true, 14) });
  s1.getRow(row).height = 24;
  row++;
  const hdrRow = s1.getRow(row);
  hdrRow.values = ['Země', 'Benefit', 'Případů', 'Náklady (Kč)', 'Ø na případ (Kč)', 'S vyplněnou částkou', 'Hlavní metrika'];
  hdrRow.getCell(3).alignment = { horizontal: 'right' };
  hdrRow.getCell(4).alignment = { horizontal: 'right' };
  hdrRow.getCell(5).alignment = { horizontal: 'right' };
  hdrRow.getCell(6).alignment = { horizontal: 'right' };
  hdrRow.getCell(7).alignment = { horizontal: 'right' };
  styleHeaderRow(hdrRow);
  row++;

  const benefitRows = [];
  const addBenefit = (country, name, st, metricKey) => {
    if (!st) return;
    benefitRows.push({ country, name, st, metricKey });
  };
  for (const [country, stats] of [['CZ', cz], ['SK', sk]]) {
    addBenefit(country, 'Towing/Recovery', stats.towing, 'rd');
    addBenefit(country, 'Technician attendance', stats.tech, 'rd');
    addBenefit(country, 'Towing + Technician', stats.combined, 'rd');
    addBenefit(country, country === 'SK' ? 'Replacement vehicle (vč. DPH)' : 'Replacement vehicle', stats.replacement, 'days');
  }
  benefitRows.forEach((b, i) => {
    const r = s1.getRow(row);
    r.values = [b.country, b.name, b.st.n, Math.round(b.st.paidSum), Math.round(b.st.paidAvg), b.st.paidN, b.metricKey === 'rd' ? b.st.metricAvg : b.st.metricAvg];
    r.getCell(1).font = F(b.country === 'CZ' ? PAL.blueDark : PAL.amberDark, true);
    r.getCell(1).fill = fill(b.country === 'CZ' ? PAL.blueLight : PAL.amberLight);
    r.getCell(1).alignment = { horizontal: 'center' };
    r.getCell(3).numFmt = NF.int; r.getCell(3).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(4).numFmt = NF.money; r.getCell(4).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(5).numFmt = NF.money; r.getCell(5).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(6).numFmt = NF.int; r.getCell(6).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(7).numFmt = b.metricKey === 'rd' ? NF.km : NF.days; r.getCell(7).alignment = { horizontal: 'right', indent: 1 };
    styleDataRow(r, i % 2 === 1);
    row++;
  });
  row++;

  // Comparison charts
  if (imgs.rd || imgs.cost) {
    s1.mergeCells(`A${row}:G${row}`);
    Object.assign(s1.getCell(`A${row}`), { value: 'Srovnávací grafy', font: F(PAL.text, true, 14) });
    s1.getRow(row).height = 24;
    row += 2;
    if (imgs.rd) {
      const id = wb.addImage({ base64: imgs.rd, extension: 'png' });
      s1.addImage(id, { tl: { col: 0, row: row - 1 }, ext: { width: 560, height: 220 } });
      row += 13;
    }
    if (imgs.cost) {
      const id = wb.addImage({ base64: imgs.cost, extension: 'png' });
      s1.addImage(id, { tl: { col: 0, row: row - 1 }, ext: { width: 560, height: 220 } });
      row += 13;
    }
  }
  s1.views = [{ state: 'frozen', ySplit: 4, showGridLines: false }];

  // ===== Sheet 2: Měsíční vývoj =====
  const s2 = wb.addWorksheet('Měsíční vývoj', { views: [{ showGridLines: false }] });
  s2.columns = [
    { width: 12 }, { width: 12 }, { width: 12 }, { width: 18 }, { width: 18 },
    { width: 16 }, { width: 16 }, { width: 18 }, { width: 18 }, { width: 16 }, { width: 16 }
  ];
  s2.mergeCells('A1:K1');
  Object.assign(s2.getCell('A1'), { value: 'Měsíční vývoj případů a metrik', font: F(PAL.blue, true, 20) });
  s2.getRow(1).height = 32;
  s2.mergeCells('A2:K2');
  Object.assign(s2.getCell('A2'), { value: `Období: ${visMonths.length ? formatMonthLabel(visMonths[0]) + ' – ' + formatMonthLabel(visMonths[visMonths.length-1]) + ` (${visMonths.length} měsíců)` : '—'}`, font: F(PAL.subtle, false, 10, true) });

  let r2 = 4;
  const hdr2 = s2.getRow(r2);
  hdr2.values = ['Měsíc', 'CZ případů', 'SK případů', 'CZ Ø nákl. T+T', 'SK Ø nákl. T+T', 'CZ Ø km T+T', 'SK Ø km T+T', 'CZ Ø nákl. Repl.', 'SK Ø nákl. Repl.', 'CZ Ø dní Repl.', 'SK Ø dní Repl.'];
  for (let c = 2; c <= 11; c++) hdr2.getCell(c).alignment = { horizontal: 'right' };
  styleHeaderRow(hdr2);
  r2++;
  monthly.forEach((m, i) => {
    const r = s2.getRow(r2);
    const idx = monthlyMetrics.months.indexOf(m.month);
    const rc = idx >= 0 ? monthlyMetrics.rescueCost : null;
    const rk = idx >= 0 ? monthlyMetrics.rescueKm : null;
    const pc = idx >= 0 ? monthlyMetrics.replCost : null;
    const pd = idx >= 0 ? monthlyMetrics.replDays : null;
    r.values = [
      formatMonthLabel(m.month), m.cz, m.sk,
      idx >= 0 && rc.cz[idx] != null ? Math.round(rc.cz[idx]) : '',
      idx >= 0 && rc.sk[idx] != null ? Math.round(rc.sk[idx]) : '',
      idx >= 0 && rk.cz[idx] != null ? Math.round(rk.cz[idx]*10)/10 : '',
      idx >= 0 && rk.sk[idx] != null ? Math.round(rk.sk[idx]*10)/10 : '',
      idx >= 0 && pc.cz[idx] != null ? Math.round(pc.cz[idx]) : '',
      idx >= 0 && pc.sk[idx] != null ? Math.round(pc.sk[idx]) : '',
      idx >= 0 && pd.cz[idx] != null ? Math.round(pd.cz[idx]*100)/100 : '',
      idx >= 0 && pd.sk[idx] != null ? Math.round(pd.sk[idx]*100)/100 : ''
    ];
    r.getCell(1).font = F(PAL.text, true);
    for (let c = 2; c <= 3; c++) { r.getCell(c).numFmt = NF.int; r.getCell(c).alignment = { horizontal: 'right', indent: 1 }; }
    for (let c = 4; c <= 5; c++) { r.getCell(c).numFmt = NF.money; r.getCell(c).alignment = { horizontal: 'right', indent: 1 }; }
    for (let c = 6; c <= 7; c++) { r.getCell(c).numFmt = NF.km; r.getCell(c).alignment = { horizontal: 'right', indent: 1 }; }
    for (let c = 8; c <= 9; c++) { r.getCell(c).numFmt = NF.money; r.getCell(c).alignment = { horizontal: 'right', indent: 1 }; }
    for (let c = 10; c <= 11; c++) { r.getCell(c).numFmt = NF.days; r.getCell(c).alignment = { horizontal: 'right', indent: 1 }; }
    styleDataRow(r, i % 2 === 1);
    r2++;
  });
  r2 += 2;

  // Charts
  if (imgs.monthly) {
    s2.mergeCells(`A${r2}:K${r2}`);
    Object.assign(s2.getCell(`A${r2}`), { value: 'Počet případů po měsících', font: F(PAL.text, true, 13) });
    s2.getRow(r2).height = 22;
    r2 += 2;
    const id = wb.addImage({ base64: imgs.monthly, extension: 'png' });
    s2.addImage(id, { tl: { col: 0, row: r2 - 1 }, ext: { width: 900, height: 280 } });
    r2 += 16;
  }
  const trendImgs = [
    { key: 'trendCostRescue', title: 'Ø náklad / případ — Towing + Technician' },
    { key: 'trendKm', title: 'Ø Route Distance — Towing + Technician' },
    { key: 'trendCostRepl', title: 'Ø náklad / případ — Replacement vehicle' },
    { key: 'trendDays', title: 'Ø dní zápůjčky — Replacement vehicle' }
  ].filter(x => imgs[x.key]);
  if (trendImgs.length) {
    s2.mergeCells(`A${r2}:K${r2}`);
    Object.assign(s2.getCell(`A${r2}`), { value: 'Vývoj klíčových ukazatelů v čase', font: F(PAL.text, true, 13) });
    s2.getRow(r2).height = 22;
    r2 += 2;
    for (let i = 0; i < trendImgs.length; i++) {
      const t = trendImgs[i];
      s2.mergeCells(`A${r2}:K${r2}`);
      Object.assign(s2.getCell(`A${r2}`), { value: t.title, font: F(PAL.mid, false, 11, true) });
      r2++;
      const id = wb.addImage({ base64: imgs[t.key], extension: 'png' });
      s2.addImage(id, { tl: { col: 0, row: r2 - 1 }, ext: { width: 760, height: 240 } });
      r2 += 14;
    }
  }
  s2.views = [{ state: 'frozen', ySplit: 4, xSplit: 1, showGridLines: false }];

  // ===== Sheet 3: Firmy =====
  const s3 = wb.addWorksheet('Firmy', { views: [{ showGridLines: false }] });
  s3.columns = [
    { width: 38 }, { width: 8 }, { width: 12 }, { width: 10 }, { width: 10 }, { width: 10 },
    { width: 16 }, { width: 16 }, { width: 16 }, { width: 14 }
  ];
  s3.mergeCells('A1:J1');
  Object.assign(s3.getCell('A1'), { value: 'Přehled po firmách', font: F(PAL.blue, true, 20) });
  s3.getRow(1).height = 32;
  s3.mergeCells('A2:J2');
  Object.assign(s3.getCell('A2'), { value: `${companies.length} firem · seřazeno podle počtu případů sestupně`, font: F(PAL.subtle, false, 10, true) });

  let r3 = 4;
  const hdr3 = s3.getRow(r3);
  hdr3.values = ['Firma', 'Země', 'Případů', 'Towing', 'Technician', 'Replacement', 'Náklady celkem (Kč)', 'Ø na případ (Kč)', 'Ø Route Distance', 'Ø dní zápůjčky'];
  for (let c = 3; c <= 10; c++) hdr3.getCell(c).alignment = { horizontal: 'right' };
  hdr3.getCell(2).alignment = { horizontal: 'center' };
  styleHeaderRow(hdr3);
  r3++;
  companies.forEach((c, i) => {
    const r = s3.getRow(r3);
    r.values = [c.name, c.country, c.cases, c.towingN, c.techN, c.replN,
                Math.round(c.paidSum), Math.round(c.paidAvg),
                c.rdN ? Math.round(c.rdAvg*10)/10 : '', c.daysN ? Math.round(c.daysAvg*100)/100 : ''];
    r.getCell(1).font = F(PAL.text, true);
    r.getCell(2).font = F(c.country === 'CZ' ? PAL.blueDark : PAL.amberDark, true);
    r.getCell(2).fill = fill(c.country === 'CZ' ? PAL.blueLight : PAL.amberLight);
    r.getCell(2).alignment = { horizontal: 'center' };
    for (let cc = 3; cc <= 6; cc++) { r.getCell(cc).numFmt = NF.int; r.getCell(cc).alignment = { horizontal: 'right', indent: 1 }; }
    r.getCell(7).numFmt = NF.money; r.getCell(7).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(8).numFmt = NF.money; r.getCell(8).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(9).numFmt = NF.km; r.getCell(9).alignment = { horizontal: 'right', indent: 1 };
    r.getCell(10).numFmt = NF.days; r.getCell(10).alignment = { horizontal: 'right', indent: 1 };
    styleDataRow(r, i % 2 === 1);
    r3++;
  });
  s3.autoFilter = { from: { row: 4, column: 1 }, to: { row: r3 - 1, column: 10 } };
  s3.views = [{ state: 'frozen', ySplit: 4, xSplit: 1, showGridLines: false }];

  // ===== Sheet 4: YoY (if exists) =====
  if (yoy) {
    const s4 = wb.addWorksheet('YoY', { views: [{ showGridLines: false }] });
    s4.columns = [{ width: 12 }, { width: 26 }, { width: 22 }, { width: 16 }, { width: 16 }, { width: 14 }];
    s4.mergeCells('A1:F1');
    Object.assign(s4.getCell('A1'), { value: `Year-to-year porovnání ${yoy.years[0]} → ${yoy.years[1]}`, font: F(PAL.blue, true, 20) });
    s4.getRow(1).height = 32;
    s4.mergeCells('A2:F2');
    Object.assign(s4.getCell('A2'), { value: `Srovnatelné období: ${formatYoYPeriod(yoy.commonMonths, yoy.years)} · respektuje filtry Vehicle Type, Benefit a Status`, font: F(PAL.subtle, false, 10, true) });

    let r4 = 4;
    const hdr4 = s4.getRow(r4);
    hdr4.values = ['Země', 'Benefit', 'Ukazatel', yoy.years[0], yoy.years[1], 'Δ %'];
    hdr4.getCell(4).alignment = { horizontal: 'right' };
    hdr4.getCell(5).alignment = { horizontal: 'right' };
    hdr4.getCell(6).alignment = { horizontal: 'right' };
    styleHeaderRow(hdr4);
    r4++;
    let altIx = 0;
    for (const [country, stats] of [['CZ', yoy.cz], ['SK', yoy.sk]]) {
      const addRow = (name, label, v1, v2, fmt) => {
        const r = s4.getRow(r4);
        const pct = deltaPct(v1, v2);
        r.values = [country, name, label, v1, v2, pct == null ? '' : pct / 100];
        r.getCell(1).font = F(country === 'CZ' ? PAL.blueDark : PAL.amberDark, true);
        r.getCell(1).fill = fill(country === 'CZ' ? PAL.blueLight : PAL.amberLight);
        r.getCell(1).alignment = { horizontal: 'center' };
        r.getCell(4).numFmt = fmt; r.getCell(4).alignment = { horizontal: 'right', indent: 1 };
        r.getCell(5).numFmt = fmt; r.getCell(5).alignment = { horizontal: 'right', indent: 1 };
        r.getCell(6).numFmt = '+0.0%;-0.0%;"±0%"';
        r.getCell(6).alignment = { horizontal: 'right', indent: 1 };
        if (pct != null) {
          r.getCell(6).font = F(pct > 0 ? PAL.green : (pct < 0 ? PAL.red : PAL.mid), true);
          r.getCell(6).fill = fill(pct > 0 ? PAL.greenLight : (pct < 0 ? PAL.redLight : PAL.rowAlt));
        }
        styleDataRow(r, altIx % 2 === 1);
        altIx++;
        r4++;
      };
      const addBenefit = (name, st, metricKey) => {
        if (!st) return;
        addRow(name, 'Případů', st.y1.n, st.y2.n, NF.int);
        addRow(name, 'Náklady celkem', st.y1.paidSum, st.y2.paidSum, NF.money);
        addRow(name, 'Ø na případ', st.y1.paidAvg, st.y2.paidAvg, NF.money);
        if (metricKey === 'rd') addRow(name, 'Ø Route Distance', st.y1.metricAvg, st.y2.metricAvg, NF.km);
        else addRow(name, 'Ø dní zápůjčky', st.y1.metricAvg, st.y2.metricAvg, NF.days);
      };
      addBenefit('Towing/Recovery', stats.towing, 'rd');
      addBenefit('Technician attendance', stats.tech, 'rd');
      addBenefit(country === 'SK' ? 'Replacement vehicle (vč. DPH)' : 'Replacement vehicle', stats.replacement, 'days');
    }
    s4.views = [{ state: 'frozen', ySplit: 4, showGridLines: false }];
  }

  // ===== Sheet 5: Audit =====
  const s5 = wb.addWorksheet('Filtry & audit', { views: [{ showGridLines: false }] });
  s5.columns = [{ width: 24 }, { width: 80 }];
  s5.mergeCells('A1:B1');
  Object.assign(s5.getCell('A1'), { value: 'Filtry & audit', font: F(PAL.blue, true, 20) });
  s5.getRow(1).height = 32;
  let r5 = 3;
  const setLine = (k, v) => {
    const r = s5.getRow(r5);
    r.values = [k, v];
    r.getCell(1).font = F(PAL.mid, true);
    r.getCell(1).alignment = { vertical: 'top', indent: 1 };
    r.getCell(2).alignment = { wrapText: true, vertical: 'top', indent: 1 };
    r.height = Math.min(120, Math.max(20, Math.ceil(String(v).length / 80) * 16));
    r5++;
  };
  setLine('Vygenerováno', new Date().toLocaleString('cs-CZ'));
  setLine('Zdroj nákladů', COST_SOURCES[activeCostKey].label);
  setLine('Vehicle Type', selectedVT.size === vehicleTypes.length ? 'Vše' : [...selectedVT].join(', '));
  setLine('Benefit', selectedBE.size === benefitsList.length ? 'Vše' : [...selectedBE].join(', '));
  setLine('Status', selectedST.size === statuses.length ? 'Vše' : [...selectedST].join(', '));
  setLine('Období', selectedMO.size === months.length ? 'Vše' : [...selectedMO].sort().join(', '));
  r5++;
  setLine('Počet domácích případů (před filtrem)', data.length);
  setLine('Počet po filtru', filtered.length);
  setLine('Duplicitních ID', duplicateIds.length);

  // Write
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const url = URL.createObjectURL(blob);
  triggerDownload(url, `NTW_RSA_visual_report_${dateStamp()}.xlsx`);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// ---------- Formatters ----------
function fmt(n) { return Math.round(n).toLocaleString('cs-CZ'); }
function dec(n, d) { return (n || 0).toLocaleString('cs-CZ', { minimumFractionDigits: d, maximumFractionDigits: d }); }
function r1(n) { return Math.round((n || 0) * 10) / 10; }
function fmtMoneyTotal(n) {
  if (n >= 1e6) return dec(n / 1e6, 1) + ' mil. Kč';
  if (n >= 1e4) return Math.round(n / 1e3).toLocaleString('cs-CZ') + ' tis. Kč';
  return Math.round(n).toLocaleString('cs-CZ') + ' Kč';
}
function fmtMoneyAvg(n) { return Math.round(n).toLocaleString('cs-CZ') + ' Kč'; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
