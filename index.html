<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NTW RSA — Přehled benefitů CZ × SK</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
:root {
  --bg: #fafaf7;
  --surface: #ffffff;
  --surface-2: #f3f1eb;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.18);
  --text: #1a1a18;
  --text-secondary: #5f5e5a;
  --text-tertiary: #888780;
  --cz: #185fa5;
  --cz-bg: #E6F1FB;
  --cz-strong: #378ADD;
  --sk: #854F0B;
  --sk-bg: #FAEEDA;
  --sk-strong: #EF9F27;
  --amber: #BA7517;
  --amber-bg: #FAEEDA;
  --amber-border: #EF9F27;
  --radius: 8px;
  --radius-lg: 12px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  padding: 22px 20px 40px; line-height: 1.5; font-size: 14px;
}
.container { max-width: 1200px; margin: 0 auto; }
header { margin-bottom: 22px; display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
.eyebrow { display: none; }
h1 { font-size: 18px; font-weight: 500; margin: 0; letter-spacing: -0.2px; color: var(--text); }
.subtitle { display: none; }

.drop-zone { display: block; border: 2px dashed var(--border-strong); border-radius: var(--radius-lg); padding: 72px 32px; text-align: center; background: var(--surface); transition: all 0.2s; cursor: pointer; }
.drop-zone:hover { background: #fcfcfa; }
.drop-zone.dragover { border-color: var(--cz); background: var(--cz-bg); }
.drop-zone .drop-icon { font-size: 44px; color: var(--text-tertiary); margin-bottom: 14px; line-height: 1; }
.drop-zone .drop-title { font-size: 17px; font-weight: 500; margin: 0 0 6px; }
.drop-zone .drop-hint { font-size: 13px; color: var(--text-secondary); margin: 0; }
.drop-zone input[type=file] { display: none; }

/* Landing */
.landing { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 24px 20px; max-width: 620px; margin: 32px auto 0; }
.landing-sub { font-size: 13px; color: var(--text-tertiary); margin: 0 0 32px; letter-spacing: 0.2px; }
.landing .drop-zone { width: 100%; padding: 58px 32px; }
.drop-viz { display: inline-flex; align-items: flex-end; gap: 5px; height: 50px; margin-bottom: 18px; }
.drop-viz span { display: block; width: 9px; background: var(--cz); border-radius: 1.5px; }
.drop-viz span:nth-child(1) { height: 24px; }
.drop-viz span:nth-child(2) { height: 38px; background: var(--cz-strong); }
.drop-viz span:nth-child(3) { height: 18px; }
.drop-viz span:nth-child(4) { height: 46px; background: var(--sk-strong); }
.drop-viz span:nth-child(5) { height: 30px; background: var(--sk); }
.feature-chips { display: flex; flex-wrap: wrap; gap: 14px 22px; justify-content: center; margin-top: 26px; font-size: 10px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1.2px; }

/* Loading */
.loading-container { display: flex; flex-direction: column; align-items: center; padding: 60px 20px 80px; min-height: 360px; }
.loading-bars { display: inline-flex; align-items: flex-end; gap: 6px; height: 56px; margin-bottom: 22px; }
.loading-bars span { display: block; width: 9px; height: 56px; background: var(--cz); border-radius: 2px; transform-origin: bottom center; transform: scaleY(0.18); opacity: 0.35; animation: bars 1.2s ease-in-out infinite; will-change: transform, opacity; }
.loading-bars span:nth-child(2) { animation-delay: 0.12s; background: var(--cz-strong); }
.loading-bars span:nth-child(3) { animation-delay: 0.24s; }
.loading-bars span:nth-child(4) { animation-delay: 0.36s; background: var(--sk-strong); }
.loading-bars span:nth-child(5) { animation-delay: 0.48s; background: var(--sk); }
@keyframes bars {
  0%, 100% { transform: scaleY(0.18); opacity: 0.35; }
  50%      { transform: scaleY(1);    opacity: 1; }
}
.loading-text { font-size: 14px; color: var(--text); margin: 0 0 28px; font-weight: 500; }
.tip-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 22px; max-width: 480px; width: 100%; text-align: left; }
.tip-label { font-size: 10px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1.2px; margin: 0 0 6px; }
.tip-text { font-size: 13px; color: var(--text); margin: 0; line-height: 1.55; min-height: 40px; transition: opacity 0.25s; }

.file-bar { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; background: var(--surface-2); border-radius: var(--radius); margin-bottom: 14px; font-size: 13px; gap: 12px; flex-wrap: wrap; }
.file-bar .left { display: flex; align-items: center; gap: 10px; color: var(--text-secondary); min-width: 0; }
.file-bar .file-name { font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-reset { background: var(--surface); border: 1px solid var(--border-strong); padding: 6px 12px; border-radius: var(--radius); cursor: pointer; font-size: 12px; color: var(--text); font-family: inherit; }
.btn-reset:hover { background: #fff; border-color: var(--text-secondary); }

.export-wrap { position: relative; display: inline-block; }
.btn-export { background: var(--surface); border: 1px solid var(--border-strong); padding: 7px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; color: var(--text); font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn-export:hover { background: #fff; border-color: var(--text-secondary); }
.btn-export .caret { font-size: 10px; color: var(--text-tertiary); margin-left: 2px; }
.export-menu {
  position: absolute; top: calc(100% + 4px); right: 0;
  background: var(--surface); border: 1px solid var(--border-strong);
  border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  min-width: 280px; z-index: 100; padding: 6px;
  display: flex; flex-direction: column; gap: 1px;
}
.export-menu[hidden] { display: none; }
.export-menu button {
  background: transparent; border: 0; padding: 9px 11px;
  border-radius: var(--radius); cursor: pointer; font-size: 13px;
  text-align: left; display: flex; align-items: center; gap: 10px;
  color: var(--text); font-family: inherit; width: 100%;
}
.export-menu button:hover { background: var(--surface-2); }
.export-menu button i { font-size: 17px; color: var(--text-secondary); width: 20px; }
.export-menu .menu-sub { font-size: 11px; color: var(--text-tertiary); margin-left: 8px; }
.export-toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: white; padding: 10px 18px; border-radius: var(--radius);
  font-size: 13px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 200;
  opacity: 0; transition: opacity 0.2s;
}
.export-toast.show { opacity: 1; }

@media print {
  body { padding: 0; background: white; }
  .container { max-width: 100%; }
  .file-bar, .filters, footer.legal, .dup-banner { display: none !important; }
  header { margin-bottom: 12px; }
  .charts-section, .companies-section, .yoy-section, .benefit-section { break-inside: avoid; page-break-inside: avoid; }
  .country-card, .hero-card { break-inside: avoid; }
  .chart-card { break-inside: avoid; }
  .companies-section .show-more-btn, .companies-section .search-input, .country-filter-btn { display: none !important; }
}

.dup-banner { background: var(--amber-bg); border: 1px solid var(--amber-border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 12px; }
.dup-banner .icon { color: var(--amber); font-size: 22px; line-height: 1; }
.dup-banner .content { flex: 1; font-size: 13px; color: var(--text); }
.dup-banner strong { font-weight: 500; }
.dup-banner details { margin-top: 6px; }
.dup-banner summary { cursor: pointer; color: var(--amber); font-size: 12px; font-weight: 500; }
.dup-list { max-height: 200px; overflow: auto; margin-top: 10px; padding: 10px 12px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 4px 14px; }

.filters { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2px 0; margin-bottom: 20px; }
.filter-group { padding: 11px 14px; border-bottom: 1px solid var(--border); }
.filter-group:last-child { border-bottom: 0; }
.filter-group-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-label { font-size: 10px; font-weight: 500; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.9px; min-width: 100px; flex-shrink: 0; }
.preset-btn { background: var(--surface); border: 1px solid var(--border-strong); padding: 5px 11px; border-radius: var(--radius); cursor: pointer; font-size: 12px; color: var(--text); font-family: inherit; transition: all 0.15s; }
.preset-btn:hover { background: var(--surface-2); }
.preset-btn.active { background: var(--text); color: white; border-color: var(--text); }
.preset-btn .count { color: var(--text-tertiary); font-size: 11px; margin-left: 4px; }
.preset-btn.active .count { color: rgba(255,255,255,0.6); }

details.subfilter { margin-top: 10px; }
details.subfilter summary { cursor: pointer; font-size: 12px; color: var(--text-tertiary); }
details.subfilter summary:hover { color: var(--text); }
details.subfilter[open] summary { margin-bottom: 8px; }
.vt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 3px 16px; }
.vt-grid label { display: flex; align-items: center; gap: 8px; font-size: 12px; cursor: pointer; padding: 2px 0; }
.vt-grid label .vt-count { color: var(--text-tertiary); font-size: 11px; margin-left: auto; }

.month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); gap: 5px; margin-top: 6px; }
.month-chip { text-align: center; padding: 5px 4px; border: 1px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; font-size: 11px; background: var(--surface); user-select: none; }
.month-chip:hover { background: var(--surface-2); }
.month-chip.checked { background: var(--cz); color: white; border-color: var(--cz); }
.month-chip .mc-count { display: block; font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
.month-chip.checked .mc-count { color: rgba(255,255,255,0.7); }

.status-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.status-chip { padding: 5px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; font-size: 12px; background: var(--surface); user-select: none; display: inline-flex; align-items: center; gap: 7px; }
.status-chip:hover { background: var(--surface-2); }
.status-chip.checked { background: var(--cz); color: white; border-color: var(--cz); }
.status-chip .sc-count { font-size: 11px; color: var(--text-tertiary); }
.status-chip.checked .sc-count { color: rgba(255,255,255,0.7); }

.hero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.hero-card { border-radius: var(--radius-lg); padding: 20px 24px; position: relative; }
.hero-card.cz { background: var(--cz-bg); }
.hero-card.sk { background: var(--sk-bg); }
.hero-card .label { font-size: 10px; font-weight: 500; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
.hero-card.cz .label { color: var(--cz); }
.hero-card.sk .label { color: var(--sk); }
.hero-card .value { font-size: 38px; font-weight: 500; margin: 0; line-height: 1; letter-spacing: -0.5px; }
.hero-card.cz .value { color: var(--cz); }
.hero-card.sk .value { color: var(--sk); }
.hero-card .sub { display: none; }

.benefit-section { margin-bottom: 22px; }
.benefit-section h3 { font-size: 11px; font-weight: 500; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
.benefit-section h3 i { font-size: 14px; color: var(--text-tertiary); }
.benefit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.country-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; position: relative; }
.country-card.cz { border-top: 2px solid var(--cz-strong); }
.country-card.sk { border-top: 2px solid var(--sk-strong); }
.country-card .country-label { font-size: 10px; font-weight: 500; letter-spacing: 0.9px; margin: 0 0 12px; text-transform: uppercase; }
.country-card.cz .country-label { color: var(--cz); }
.country-card.sk .country-label { color: var(--sk); }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 14px; }
.stat .stat-label { font-size: 11px; color: var(--text-tertiary); margin: 0 0 4px; font-weight: 400; }
.stat .stat-value { font-size: 22px; font-weight: 500; margin: 0; line-height: 1.1; letter-spacing: -0.2px; }
.stat.highlight { grid-column: span 3; background: var(--surface-2); border-radius: var(--radius); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 4px; }
.stat.highlight .stat-label { margin: 0; }
.stat.highlight .stat-value { font-size: 24px; }
.country-card.cz .stat.highlight { background: var(--cz-bg); }
.country-card.cz .stat.highlight .stat-label, .country-card.cz .stat.highlight .stat-value { color: var(--cz); }
.country-card.sk .stat.highlight { background: var(--sk-bg); }
.country-card.sk .stat.highlight .stat-label, .country-card.sk .stat.highlight .stat-value { color: var(--sk); }

.vat-badge { display: inline-block; margin-left: 8px; padding: 2px 8px; background: var(--sk-strong); color: white; border-radius: 8px; font-size: 9px; letter-spacing: 0.6px; text-transform: uppercase; font-weight: 600; vertical-align: 1px; }
.vat-tag { display: inline-block; margin-left: 6px; padding: 1px 5px; background: var(--sk-strong); color: white; border-radius: 6px; font-size: 8px; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; vertical-align: 1px; }

.charts-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 4px; }
.charts-title { font-size: 11px; font-weight: 500; margin: 0 0 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.chart-card .chart-title { font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin: 0 0 8px; }
.chart-wrap { position: relative; width: 100%; height: 260px; }
.chart-wrap.tall { height: 300px; }
.chart-card.full { grid-column: 1 / -1; margin-top: 12px; }
.legend { display: flex; gap: 16px; justify-content: center; margin-top: 10px; font-size: 11px; color: var(--text-tertiary); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; }

.companies-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 18px; }
.companies-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
.companies-title { font-size: 11px; font-weight: 500; margin: 0; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
.companies-title i { color: var(--text-tertiary); font-size: 14px; }
.companies-tools { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.search-input { padding: 6px 11px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 12px; font-family: inherit; min-width: 200px; background: var(--surface); }
.search-input:focus { outline: none; border-color: var(--cz); }
.country-filter-btn { padding: 5px 11px; border: 1px solid var(--border-strong); border-radius: var(--radius); cursor: pointer; font-size: 11px; background: var(--surface); font-family: inherit; color: var(--text); }
.country-filter-btn.active { background: var(--text); color: white; border-color: var(--text); }
.table-wrap { overflow-x: auto; }
.companies-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 760px; }
.companies-table th { text-align: left; padding: 9px 8px; font-weight: 500; color: var(--text-tertiary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; border-bottom: 1px solid var(--border-strong); cursor: pointer; user-select: none; white-space: nowrap; }
.companies-table th.right { text-align: right; }
.companies-table th:hover { color: var(--text); }
.companies-table th .sort-ind { color: var(--text-tertiary); margin-left: 4px; font-size: 9px; }
.companies-table th.sorted { color: var(--text); }
.companies-table td { padding: 8px; border-bottom: 1px solid var(--border); }
.companies-table td.right { text-align: right; font-variant-numeric: tabular-nums; }
.companies-table tbody tr:hover { background: var(--surface-2); }
.companies-table td.name { font-weight: 500; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.country-pill { display: inline-block; padding: 1px 7px; border-radius: 9px; font-size: 10px; font-weight: 500; }
.country-pill.cz { background: var(--cz-bg); color: var(--cz); }
.country-pill.sk { background: var(--sk-bg); color: var(--sk); }
.companies-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 11px; color: var(--text-tertiary); }
.show-more-btn { background: var(--surface); border: 1px solid var(--border-strong); padding: 5px 12px; border-radius: var(--radius); cursor: pointer; font-size: 11px; font-family: inherit; color: var(--text); }
.show-more-btn:hover { background: var(--surface-2); }

.yoy-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 18px; }
.yoy-header { margin-bottom: 12px; }
.yoy-header .charts-title { margin: 0; }
.yoy-period { font-size: 11px; color: var(--text-tertiary); margin: 4px 0 0; }
.yoy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.yoy-card { border-radius: var(--radius); padding: 12px 14px; }
.yoy-card.cz { background: var(--cz-bg); }
.yoy-card.sk { background: var(--sk-bg); }
.yoy-card .country-label { font-size: 10px; font-weight: 500; letter-spacing: 0.9px; margin: 0 0 8px; text-transform: uppercase; }
.yoy-card.cz .country-label { color: var(--cz); }
.yoy-card.sk .country-label { color: var(--sk); }
.yoy-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.yoy-table th { text-align: left; padding: 6px 4px; font-weight: 500; color: var(--text-tertiary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0,0,0,0.08); }
.yoy-table th.right { text-align: right; }
.yoy-table td { padding: 6px 4px; border-bottom: 1px solid rgba(0,0,0,0.05); font-variant-numeric: tabular-nums; }
.yoy-table td.right { text-align: right; }
.yoy-table tr:last-child td { border-bottom: 0; }
.yoy-table tr.divider td { font-weight: 500; padding-top: 12px; padding-bottom: 3px; border-bottom: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); }
.yoy-card.cz .yoy-table tr.divider td { color: var(--cz); }
.yoy-card.sk .yoy-table tr.divider td { color: var(--sk); }
.delta { font-size: 11px; padding: 1px 6px; border-radius: 9px; font-weight: 500; white-space: nowrap; }
.delta.pos { background: #E1F5EE; color: #0F6E56; }
.delta.neg { background: #FCEBEB; color: #791F1F; }
.delta.zero { background: rgba(0,0,0,0.05); color: var(--text-secondary); }
.delta.na { color: var(--text-tertiary); }
.yoy-empty { text-align: center; padding: 20px; color: var(--text-tertiary); font-size: 12px; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin: -4px 0 20px; border-bottom: 1px solid var(--border-strong); overflow-x: auto; }
.tab-btn { background: transparent; border: 0; padding: 10px 18px; font-size: 13px; color: var(--text-tertiary); cursor: pointer; font-family: inherit; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--cz); font-weight: 500; }
.tab-pane > * + * { margin-top: 18px; }

/* MoM */
.mom-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
.mom-title { font-size: 11px; font-weight: 500; margin: 0; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); }
.mom-period { font-size: 11px; color: var(--text-tertiary); margin: 4px 0 14px; }
.mom-hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
.mom-card { border-radius: var(--radius); padding: 12px 16px; }
.mom-card.cz { background: var(--cz-bg); }
.mom-card.sk { background: var(--sk-bg); }
.mom-card .country-label { font-size: 10px; font-weight: 500; letter-spacing: 0.9px; margin: 0 0 3px; text-transform: uppercase; }
.mom-card.cz .country-label { color: var(--cz); }
.mom-card.sk .country-label { color: var(--sk); }
.mom-card .mom-arrow { font-size: 10px; color: var(--text-tertiary); margin: 0 0 12px; }
.mom-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 14px; }
.mom-stat { display: flex; flex-direction: column; gap: 4px; }
.mom-stat .stat-label { font-size: 11px; color: var(--text-tertiary); margin: 0; font-weight: 400; }
.mom-stat .stat-value { font-size: 19px; font-weight: 500; margin: 0; line-height: 1.1; font-variant-numeric: tabular-nums; letter-spacing: -0.2px; }
.mom-stat .stat-prev { font-size: 10px; color: var(--text-tertiary); margin: 0; }
.mom-stat .delta { align-self: flex-start; margin-top: 1px; }

/* Heatmap tooltip */
.okres-tile { position: relative; }
.okres-tile .ot-tip { position: absolute; left: 50%; bottom: calc(100% + 6px); transform: translateX(-50%); background: var(--text); color: white; padding: 7px 11px; border-radius: 6px; font-size: 11px; line-height: 1.4; opacity: 0; pointer-events: none; transition: opacity 0.12s, transform 0.12s; white-space: nowrap; z-index: 50; box-shadow: 0 4px 14px rgba(0,0,0,0.18); text-align: left; }
.okres-tile .ot-tip::after { content: ''; position: absolute; top: 100%; left: 50%; margin-left: -5px; border: 5px solid transparent; border-top-color: var(--text); }
.okres-tile:hover .ot-tip { opacity: 1; transform: translateX(-50%) translateY(-2px); }
.okres-tile .ot-tip-name { font-weight: 600; font-size: 12px; margin: 0 0 3px; }
.okres-tile .ot-tip-row { display: flex; gap: 10px; justify-content: space-between; }
.okres-tile .ot-tip-row .lbl { color: rgba(255,255,255,0.6); }
.okres-tile .ot-tip-row .val { font-variant-numeric: tabular-nums; }

footer.legal { display: none; }

/* Heatmap */
.heatmap-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-top: 18px; }
.heatmap-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }
.heatmap-title { font-size: 11px; font-weight: 500; margin: 0; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
.heatmap-title i { color: var(--text-tertiary); font-size: 14px; }
.heatmap-tools { display: flex; gap: 6px; flex-wrap: wrap; }
.heatmap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 5px; }
.okres-tile { padding: 9px 12px; border-radius: var(--radius); position: relative; transition: transform 0.12s; }
.okres-tile:hover { transform: translateY(-1px); }
.okres-tile .ot-name { font-size: 11px; font-weight: 500; line-height: 1.2; margin: 0 0 4px; opacity: 0.85; }
.okres-tile .ot-count { font-size: 18px; font-weight: 500; line-height: 1; font-variant-numeric: tabular-nums; }
.okres-tile.unmapped { background: var(--surface-2); color: var(--text-tertiary); border: 1px dashed var(--border-strong); }
.heatmap-summary { font-size: 11px; color: var(--text-tertiary); margin-top: 10px; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

@media (max-width: 760px) {
  .hero, .benefit-grid, .charts-grid, .yoy-grid { grid-template-columns: 1fr; }

  const el = $('#tip-text'); if (!el) return;

  el.textContent = shuffled[i];
  el.style.opacity = '1';

      i = (i + 1) % shuffled.length;
      el.textContent = shuffled[i];

function normalizeCityName(c) {
  if (c == null) return null;
  let s = String(c).trim();
  if (!s || s.toLowerCase() === 'no city') return null;
  if (/^prague$/i.test(s)) return 'Praha';
  if (/^Praha\b/i.test(s)) return 'Praha';
  if (/^Brno\b/i.test(s)) return 'Brno';
  if (/^(Moravská\s+Ostrava|Slezská\s+Ostrava|Ostrava)\b/i.test(s)) return 'Ostrava';
  if (/^Plzeň\b/i.test(s)) return 'Plzeň';
  if (/^Liberec\b/i.test(s)) return 'Liberec';
  if (/^Olomouc\b/i.test(s)) return 'Olomouc';
  if (/^Bratislava\b/i.test(s)) return 'Bratislava';
  if (/^Košice\b/i.test(s)) return 'Košice';
  // Strip trailing post office digits e.g. "Frýdek-Místek 1", "Cheb 2"
  s = s.replace(/\s+\d+$/, '');
  return s.trim();
}

function cityToOkres(city, country) {
  const n = normalizeCityName(city);
  if (!n) return null;
  const map = country === 'Czech Republic' ? CITY_OKRES_CZ : (country === 'Slovakia' ? CITY_OKRES_SK : null);
  if (!map) return null;
  return map[n] || null;
}

const dropZone = $('#drop-zone');

function resetApp() {

  vehicleTypes = []; benefitsList = []; statuses = []; months = [];

function handleFile(file) {
  $('#upload-section').hidden = true;
  $('#loading-section').hidden = false;
  $('#loading-text').textContent = 'Načítám soubor…';
  startTips();
  setTimeout(() => parseFile(file), 30);
}

function parseFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      $('#loading-text').textContent = 'Zpracovávám data…';
      setTimeout(() => {
        const u8 = new Uint8Array(e.target.result);
        const wb = XLSX.read(u8, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: null });

        let hIdx = -1;
        for (let i = 0; i < Math.min(15, rows.length); i++) {
          if ((rows[i] || []).some(c => String(c ?? '').trim() === COL.pc)) { hIdx = i; break; }
        }
        if (hIdx < 0) throw new Error('Hlavička s "Provider Country" nebyla nalezena.');

        const header = rows[hIdx].map(h => String(h ?? '').trim());
        const all = [];
        for (let i = hIdx + 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r || r.every(c => c == null || c === '')) continue;
          const obj = {};
          for (let j = 0; j < header.length; j++) obj[header[j]] = r[j];
          const pc = obj[COL.pc], ec = obj[COL.ec];
          if ((pc === 'Czech Republic' && ec === 'Czech Republic') ||
              (pc === 'Slovakia' && ec === 'Slovakia')) {
            all.push(obj);
          }
        }
        data = all;

        // Duplicate detection
        const idCount = {};
        for (const r of data) {
          const id = r[COL.id];
          if (id == null || id === '') continue;
          const k = String(id);
          idCount[k] = (idCount[k] || 0) + 1;
        }
        duplicateIds = Object.entries(idCount).filter(([, c]) => c > 1).map(([id, c]) => ({ id, count: c }));

        // Build filter dimensions
        vehicleTypeCounts = {}; benefitCounts = {}; statusCounts = {}; monthCounts = {};
        for (const r of data) {
          let t = r[COL.vt]; t = (t == null || String(t).trim() === '') ? '(neuvedeno)' : String(t).trim();
          vehicleTypeCounts[t] = (vehicleTypeCounts[t] || 0) + 1;
          let bf = r[COL.benefit]; bf = (bf == null || String(bf).trim() === '') ? '(neuvedeno)' : String(bf).trim();
          benefitCounts[bf] = (benefitCounts[bf] || 0) + 1;
          let s = r[COL.status]; s = (s == null || String(s).trim() === '') ? '(neuvedeno)' : String(s).trim();
          statusCounts[s] = (statusCounts[s] || 0) + 1;
          let m = r[COL.month]; m = (m == null || String(m).trim() === '') ? '(neuvedeno)' : String(m).trim();
          monthCounts[m] = (monthCounts[m] || 0) + 1;
        }
        vehicleTypes = Object.keys(vehicleTypeCounts).sort((a, b) => vehicleTypeCounts[b] - vehicleTypeCounts[a]);
        benefitsList = Object.keys(benefitCounts).sort((a, b) => benefitCounts[b] - benefitCounts[a]);
        statuses = Object.keys(statusCounts).sort((a, b) => statusCounts[b] - statusCounts[a]);
        months = Object.keys(monthCounts).filter(m => m !== '(neuvedeno)').sort();
        if (monthCounts['(neuvedeno)']) months.push('(neuvedeno)');

        selectedVT = new Set(vehicleTypes);
        selectedBE = new Set(benefitsList);
        selectedST = new Set(statuses.filter(s => s !== 'Cancelled'));
        selectedMO = new Set(months);

        $('#file-name').textContent = file.name;
        $('#row-count').textContent = `· ${fmt(data.length)} domácích případů (CZ→CZ + SK→SK)`;

        buildVTFilter(); buildBEFilter(); buildSTFilter(); buildMOFilter();
        updateAllPresetCounts(); updateAllPresetActiveStates();
        updateCostSourceUI();
        renderDupBanner();

        $('#loading-section').hidden = true;
        $('#dashboard-section').hidden = false;
        stopTips();
        renderDashboard();
      }, 30);
    } catch (err) {
      console.error(err);
      stopTips();
      alert('Chyba při načítání souboru:\n' + err.message);
      $('#loading-section').hidden = true;
      $('#upload-section').hidden = false;
    }
  };
  reader.onerror = () => {
    stopTips();
    alert('Nepodařilo se přečíst soubor.');
    $('#loading-section').hidden = true;
    $('#upload-section').hidden = false;
  };
  reader.readAsArrayBuffer(file);
}

// ---------- Duplicate banner ----------
function renderDupBanner() {
  const wrap = $('#dup-banner-wrap');
  if (!duplicateIds.length) { wrap.innerHTML = ''; return; }
  const totalRows = duplicateIds.reduce((a, x) => a + x.count, 0);
  const sample = duplicateIds.slice(0, 500);
  const ids = sample.map(x => `<span>${escapeHtml(x.id)}${x.count > 2 ? ` ×${x.count}` : ''}</span>`).join('');
  const more = duplicateIds.length > 500 ? `<p style="margin: 8px 0 0; font-size: 11px; color: var(--text-tertiary);">Zobrazeno prvních 500 z ${fmt(duplicateIds.length)}.</p>` : '';
  wrap.innerHTML = `
    <div class="dup-banner">
      <i class="ti ti-alert-triangle icon"></i>
      <div class="content">
        <strong>${fmt(duplicateIds.length)} duplicitních ID</strong> v Benefit assignment · ${fmt(totalRows)} řádků
        <details>
          <summary>Zobrazit</summary>
          <div class="dup-list">${ids}</div>
          ${more}
        </details>
      </div>
    </div>`;
}

// ---------- Vehicle Type filter ----------
function isStandard(t) { return /standard|^vehicle\s*<\s*3\.5|^oversized/i.test(t); }
function isHeavy(t) { return /^heavy/i.test(t); }
function isVTOther(t) { return !isStandard(t) && !isHeavy(t); }

function buildVTFilter() {
  const grid = $('#vt-grid');
  grid.innerHTML = '';
  for (const t of vehicleTypes) {
    const lbl = document.createElement('label');
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = selectedVT.has(t); cb.dataset.type = t;
    cb.addEventListener('change', () => {
      if (cb.checked) selectedVT.add(t); else selectedVT.delete(t);
      updateAllPresetActiveStates(); renderDashboard();
    });
    const span = document.createElement('span'); span.textContent = t;
    const cnt = document.createElement('span'); cnt.className = 'vt-count'; cnt.textContent = fmt(vehicleTypeCounts[t]);
    lbl.append(cb, span, cnt); grid.appendChild(lbl);
  }
}

function applyVTPreset(preset) {
  selectedVT.clear();
  let pred = () => true;
  if (preset === 'standard') pred = isStandard;
  else if (preset === 'heavy') pred = isHeavy;
  else if (preset === 'other') pred = isVTOther;
  for (const t of vehicleTypes) if (pred(t)) selectedVT.add(t);
  $$('#vt-grid input').forEach(cb => cb.checked = selectedVT.has(cb.dataset.type));
  updateAllPresetActiveStates(); renderDashboard();
}

// ---------- Status filter ----------
function buildSTFilter() {
  const grid = $('#st-grid');
  grid.innerHTML = '';
  for (const s of statuses) {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (selectedST.has(s) ? ' checked' : '');
    chip.dataset.status = s;
    chip.innerHTML = `<span>${escapeHtml(s)}</span><span class="sc-count">${fmt(statusCounts[s])}</span>`;
    chip.addEventListener('click', () => {
      if (selectedST.has(s)) selectedST.delete(s); else selectedST.add(s);
      chip.classList.toggle('checked');
      updateAllPresetActiveStates(); renderDashboard();
    });
    grid.appendChild(chip);
  }
}

function applySTPreset(preset) {
  selectedST.clear();
  if (preset === 'all') for (const s of statuses) selectedST.add(s);
  else if (preset === 'exclude-cancelled') for (const s of statuses) if (s !== 'Cancelled') selectedST.add(s);
  else if (preset === 'only-settled') { if (statusCounts['Settled']) selectedST.add('Settled'); }
  $$('#st-grid .status-chip').forEach(ch => ch.classList.toggle('checked', selectedST.has(ch.dataset.status)));
  updateAllPresetActiveStates(); renderDashboard();
}

// ---------- Time / Month filter ----------
function yearOfMonth(m) { return m.length >= 4 ? m.substring(0, 4) : ''; }

function buildMOFilter() {
  const grid = $('#month-grid');
  grid.innerHTML = '';
  for (const m of months) {
    const chip = document.createElement('div');
    chip.className = 'month-chip' + (selectedMO.has(m) ? ' checked' : '');
    chip.dataset.month = m;
    const label = (m === '(neuvedeno)') ? '(neuvedeno)' : formatMonthLabel(m);
    chip.innerHTML = `<div>${label}</div><span class="mc-count">${fmt(monthCounts[m])}</span>`;
    chip.addEventListener('click', () => {
      if (selectedMO.has(m)) selectedMO.delete(m); else selectedMO.add(m);
      chip.classList.toggle('checked');
      updateAllPresetActiveStates(); renderDashboard();
    });
    grid.appendChild(chip);
  }
}

function formatMonthLabel(yyyymm) {
  if (yyyymm.length !== 6) return yyyymm;
  const y = yyyymm.substring(2, 4);
  const m = parseInt(yyyymm.substring(4, 6), 10);
  return `${CZ_MONTHS[m-1] || yyyymm} ${y}`;
}

function applyTMPreset(preset) {
  selectedMO.clear();
  if (preset === 'all') for (const m of months) selectedMO.add(m);
  else if (preset === '2025' || preset === '2026') {
    for (const m of months) if (yearOfMonth(m) === preset) selectedMO.add(m);
  }
  $$('#month-grid .month-chip').forEach(ch => ch.classList.toggle('checked', selectedMO.has(ch.dataset.month)));

function updateAllPresetActiveStates() {
  const sigOf = (set) => [...set].sort().join('|');
  const vtSig = sigOf(selectedVT);
  const matchSet = (sig, arr) => sig === arr.sort().join('|');
  let vtA = null;
  if (matchSet(vtSig, vehicleTypes.slice())) vtA = 'all';
  else if (matchSet(vtSig, vehicleTypes.filter(isStandard))) vtA = 'standard';
  else if (matchSet(vtSig, vehicleTypes.filter(isHeavy))) vtA = 'heavy';
  else if (matchSet(vtSig, vehicleTypes.filter(isVTOther))) vtA = 'other';
  $$('[data-vt-preset]').forEach(b => b.classList.toggle('active', b.dataset.vtPreset === vtA));

  const stSig = sigOf(selectedST);
  let stA = null;
  if (matchSet(stSig, statuses.slice())) stA = 'all';
  else if (matchSet(stSig, statuses.filter(s => s !== 'Cancelled'))) stA = 'exclude-cancelled';
  else if (selectedST.size === 1 && selectedST.has('Settled')) stA = 'only-settled';
  else if (selectedST.size === 0) stA = 'none';
  $$('[data-st-preset]').forEach(b => b.classList.toggle('active', b.dataset.stPreset === stA));

  const beSig = sigOf(selectedBE);
  let beA = null;
  if (matchSet(beSig, benefitsList.slice())) beA = 'all';
  else if (matchSet(beSig, benefitsList.filter(b => MAIN_BENEFITS.includes(b)))) beA = 'main';
  else if (selectedBE.size === 0) beA = 'none';
  $$('[data-be-preset]').forEach(b => b.classList.toggle('active', b.dataset.bePreset === beA));

  const tmSig = sigOf(selectedMO);
  let tmA = null;
  if (matchSet(tmSig, months.slice())) tmA = 'all';
  else if (matchSet(tmSig, months.filter(m => yearOfMonth(m) === '2025'))) tmA = '2025';
  else if (matchSet(tmSig, months.filter(m => yearOfMonth(m) === '2026'))) tmA = '2026';
  else if (selectedMO.size === 0) tmA = 'none';
  $$('[data-tm-preset]').forEach(b => b.classList.toggle('active', b.dataset.tmPreset === tmA));
}

// ---------- Filtering ----------
function rowPassesFilters(r) {
  let t = r[COL.vt]; t = (t == null || String(t).trim() === '') ? '(neuvedeno)' : String(t).trim();
  if (!selectedVT.has(t)) return false;
  let b = r[COL.benefit]; b = (b == null || String(b).trim() === '') ? '(neuvedeno)' : String(b).trim();
  if (!selectedBE.has(b)) return false;
  let s = r[COL.status]; s = (s == null || String(s).trim() === '') ? '(neuvedeno)' : String(s).trim();
  if (!selectedST.has(s)) return false;
  let m = r[COL.month]; m = (m == null || String(m).trim() === '') ? '(neuvedeno)' : String(m).trim();
  if (!selectedMO.has(m)) return false;
  return true;
}
function getFilteredData() { return data.filter(rowPassesFilters); }

// ---------- Stats ----------
function computeStats(rows, country, benefits, metric) {
  const wantPC = country === 'CZ' ? 'Czech Republic' : 'Slovakia';
  const costCol = activeCostCol();
  let n = 0, paidSum = 0, paidN = 0, mSum = 0, mN = 0;
  for (const r of rows) {
    if (r[COL.pc] !== wantPC) continue;
    if (!benefits.includes(r[COL.benefit])) continue;
    n++;
    const p = r[costCol];
    if (p != null && p !== '') { const pn = Number(p); if (!isNaN(pn)) { paidSum += pn; paidN++; } }
    const v = r[metric];
    if (v != null && v !== '') { const vn = Number(v); if (!isNaN(vn)) { mSum += vn; mN++; } }
  }
  return { n, paidSum, paidAvg: paidN ? paidSum / paidN : 0, metricAvg: mN ? mSum / mN : 0, paidN };
}

function computeCompanies(rows) {
  const map = new Map();
  const costCol = activeCostCol();
  for (const r of rows) {
    const name = r[COL.company];
    if (name == null || String(name).trim() === '') continue;
    const k = String(name).trim();
    let c = map.get(k);
    if (!c) {
      c = { name: k, country: (r[COL.pc] === 'Slovakia' ? 'SK' : 'CZ'), cases: 0,
            paidSum: 0, paidN: 0, rdSum: 0, rdN: 0, daysSum: 0, daysN: 0,
            towingN: 0, techN: 0, replN: 0 };
      map.set(k, c);
    }
    c.cases++;
    const b = r[COL.benefit];
    if (b === 'Towing/Recovery') c.towingN++;
    else if (b === 'Technician attendance') c.techN++;
    else if (b === 'Replacement vehicle') c.replN++;
    const p = r[costCol];
    if (p != null && p !== '') { const pn = Number(p); if (!isNaN(pn)) { c.paidSum += pn; c.paidN++; } }
    if (b === 'Towing/Recovery' || b === 'Technician attendance') {
      const v = r[COL.rd];
      if (v != null && v !== '') { const vn = Number(v); if (!isNaN(vn)) { c.rdSum += vn; c.rdN++; } }
    }
    if (b === 'Replacement vehicle') {
      const v = r[COL.days];
      if (v != null && v !== '') { const vn = Number(v); if (!isNaN(vn)) { c.daysSum += vn; c.daysN++; } }
    }
  }
  return [...map.values()].map(c => ({
    ...c,
    paidAvg: c.paidN ? c.paidSum / c.paidN : 0,
    rdAvg: c.rdN ? c.rdSum / c.rdN : 0,
    daysAvg: c.daysN ? c.daysSum / c.daysN : 0
  }));
}

function visibleMonths() {
  return [...selectedMO].filter(m => /^\d{6}$/.test(m)).sort();
}

function computeMonthlyMetrics(rows, monthList) {
  const buckets = {};
  const costCol = activeCostCol();
  const list = monthList || months.filter(m => m !== '(neuvedeno)');
  for (const m of list) {
    buckets[m] = {
      cz: { resPaidS: 0, resPaidN: 0, resRdS: 0, resRdN: 0, rplPaidS: 0, rplPaidN: 0, rplDS: 0, rplDN: 0 },
      sk: { resPaidS: 0, resPaidN: 0, resRdS: 0, resRdN: 0, rplPaidS: 0, rplPaidN: 0, rplDS: 0, rplDN: 0 }
    };
  }
  for (const r of rows) {
    const m = String(r[COL.month] || '').trim();
    if (!buckets[m]) continue;
    const c = r[COL.pc] === 'Czech Republic' ? 'cz' : (r[COL.pc] === 'Slovakia' ? 'sk' : null);
    if (!c) continue;
    const b = r[COL.benefit];
    const isRescue = (b === 'Towing/Recovery' || b === 'Technician attendance');
    const isRepl = (b === 'Replacement vehicle');
    if (!isRescue && !isRepl) continue;
    const buc = buckets[m][c];
    const p = r[costCol];
    const pn = (p != null && p !== '') ? Number(p) : NaN;
    if (isRescue) {
      if (!isNaN(pn)) { buc.resPaidS += pn; buc.resPaidN++; }
      const v = r[COL.rd]; const vn = (v != null && v !== '') ? Number(v) : NaN;
      if (!isNaN(vn)) { buc.resRdS += vn; buc.resRdN++; }
    } else {
      if (!isNaN(pn)) { buc.rplPaidS += pn; buc.rplPaidN++; }
      const v = r[COL.days]; const vn = (v != null && v !== '') ? Number(v) : NaN;
      if (!isNaN(vn)) { buc.rplDS += vn; buc.rplDN++; }
    }
  }
  const sorted = Object.keys(buckets).sort();
  const avg = (s, n) => n ? s / n : null;
  return {
    months: sorted,
    rescueCost: { cz: sorted.map(m => avg(buckets[m].cz.resPaidS, buckets[m].cz.resPaidN)),
                  sk: sorted.map(m => avg(buckets[m].sk.resPaidS, buckets[m].sk.resPaidN)) },
    rescueKm:   { cz: sorted.map(m => avg(buckets[m].cz.resRdS, buckets[m].cz.resRdN)),
                  sk: sorted.map(m => avg(buckets[m].sk.resRdS, buckets[m].sk.resRdN)) },
    replCost:   { cz: sorted.map(m => avg(buckets[m].cz.rplPaidS, buckets[m].cz.rplPaidN)),
                  sk: sorted.map(m => avg(buckets[m].sk.rplPaidS, buckets[m].sk.rplPaidN)) },
    replDays:   { cz: sorted.map(m => avg(buckets[m].cz.rplDS, buckets[m].cz.rplDN)),
                  sk: sorted.map(m => avg(buckets[m].sk.rplDS, buckets[m].sk.rplDN)) }
  };
}

function computeMonthly(rows, monthList) {
  const list = monthList || months.filter(m => m !== '(neuvedeno)');
  const map = {};
  for (const m of list) map[m] = { cz: 0, sk: 0 };
  for (const r of rows) {
    const m = r[COL.month] != null ? String(r[COL.month]).trim() : '';
    if (!map[m]) continue;
    if (r[COL.pc] === 'Czech Republic') map[m].cz++;
    else if (r[COL.pc] === 'Slovakia') map[m].sk++;
  }
  return Object.keys(map).sort().map(k => ({ month: k, ...map[k] }));
}

// ---------- MoM ----------
function computeMoMStats(rows, monthList) {
  let months = (monthList && monthList.length) ? [...monthList].filter(m => /^\d{6}$/.test(m)).sort() : [];
  if (!months.length) {
    const set = new Set();
    for (const r of rows) {
      const m = String(r[COL.month] || '').trim();
      if (/^\d{6}$/.test(m)) set.add(m);
    }
    months = Array.from(set).sort();
  }
  if (months.length > 12) months = months.slice(-12);

  const costCol = activeCostCol();
  const init = m => ({ month: m, cases: 0, totalCost: 0, costN: 0, avgCost: 0,
                      deltaCases: null, deltaTotal: null, deltaAvg: null });
  const cz = months.map(init);
  const sk = months.map(init);
  const idx = new Map(months.map((m, i) => [m, i]));

  for (const r of rows) {
    const m = String(r[COL.month] || '').trim();
    const i = idx.get(m);
    if (i === undefined) continue;
    const country = r[COL.pc];
    const bucket = country === 'Czech Republic' ? cz[i] : (country === 'Slovakia' ? sk[i] : null);
    if (!bucket) continue;
    bucket.cases++;
    const c = r[costCol];
    const cn = (c != null && c !== '') ? Number(c) : NaN;
    if (!isNaN(cn)) { bucket.totalCost += cn; bucket.costN++; }
  }

  function finalize(arr) {
    for (const a of arr) a.avgCost = a.costN ? a.totalCost / a.costN : 0;
    for (let i = 1; i < arr.length; i++) {
      const p = arr[i-1], c = arr[i];
      c.deltaCases = p.cases > 0 ? ((c.cases - p.cases) / p.cases) * 100 : null;
      c.deltaTotal = p.totalCost > 0 ? ((c.totalCost - p.totalCost) / p.totalCost) * 100 : null;
      c.deltaAvg = p.avgCost > 0 ? ((c.avgCost - p.avgCost) / p.avgCost) * 100 : null;
    }
  }
  finalize(cz); finalize(sk);
  return { months, cz, sk };
}

function deltaBadge(d) {
  if (d == null) return '<span class="delta na">—</span>';
  if (Math.abs(d) < 0.1) return '<span class="delta zero">0%</span>';
  const cls = d > 0 ? 'pos' : 'neg';
  const sign = d > 0 ? '+' : '';
  return `<span class="delta ${cls}">${sign}${d.toFixed(1)}%</span>`;
}

function drawMoMCharts(stats) {

  const baseScales = {
    x: { grid: { display: false }, ticks: { font: { size: 10 } } },

    options: baseOpts
  });
  if ($('#mom-avg')) charts.momAvg = new Chart($('#mom-avg'), {

function drawCharts({ cz, sk, monthly, monthlyMetrics, flags, showRdChart, showCostChart }) {
  destroyCharts();
  const baseOpts = {
    responsive: true, maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { grid: { display: false }, ticks: { font: { size: 11 } } },
      y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.06)' }, ticks: { font: { size: 11 } } }
    }
  };

  // RD bar chart — only Towing/Tech/Combined relevant
  if (showRdChart && $('#chart-rd')) {
    const labels = [], czD = [], skD = [];
    if (flags.hasTowing)   { labels.push('Towing');     czD.push(r1(cz.towing.metricAvg));    skD.push(r1(sk.towing.metricAvg)); }
    if (flags.hasTech)     { labels.push('Technician'); czD.push(r1(cz.tech.metricAvg));      skD.push(r1(sk.tech.metricAvg)); }
    if (flags.hasCombined) { labels.push('Combined');   czD.push(r1(cz.combined.metricAvg)); skD.push(r1(sk.combined.metricAvg)); }
    if (labels.length) {
      const o = JSON.parse(JSON.stringify(baseOpts));
      o.plugins.tooltip = { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${dec(ctx.parsed.y, 1)} km` } };
      charts.rd = new Chart($('#chart-rd'), {
        type: 'bar',
        data: { labels, datasets: [
          { label: 'CZ', data: czD, backgroundColor: '#185fa5', borderRadius: 4 },
          { label: 'SK', data: skD, backgroundColor: '#EF9F27', borderRadius: 4 }
        ]},
        options: o
      });
    }
  }

  // Cost bar chart — Towing/Tech/Combined/Replacement relevant
  if (showCostChart && $('#chart-cost')) {
    const labels = [], czD = [], skD = [];
    if (flags.hasTowing)      { labels.push('Towing');      czD.push(Math.round(cz.towing.paidAvg));      skD.push(Math.round(sk.towing.paidAvg)); }
    if (flags.hasTech)        { labels.push('Technician');  czD.push(Math.round(cz.tech.paidAvg));        skD.push(Math.round(sk.tech.paidAvg)); }
    if (flags.hasCombined)    { labels.push('Combined');    czD.push(Math.round(cz.combined.paidAvg));    skD.push(Math.round(sk.combined.paidAvg)); }
    if (flags.hasReplacement) { labels.push('Replacement'); czD.push(Math.round(cz.replacement.paidAvg)); skD.push(Math.round(sk.replacement.paidAvg)); }
    if (labels.length) {
      const o = JSON.parse(JSON.stringify(baseOpts));
      o.plugins.tooltip = { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${fmtMoneyAvg(ctx.parsed.y)}` } };
      charts.cost = new Chart($('#chart-cost'), {
        type: 'bar',
        data: { labels, datasets: [
          { label: 'CZ', data: czD, backgroundColor: '#185fa5', borderRadius: 4 },
          { label: 'SK', data: skD, backgroundColor: '#EF9F27', borderRadius: 4 }
        ]},
        options: o
      });
    }
  }

  // Monthly cases (always shown, but adapts to visible months)
  if ($('#chart-monthly') && monthly.length) {
    const moOpts = JSON.parse(JSON.stringify(baseOpts));
    moOpts.scales.x.ticks = { font: { size: 10 }, maxRotation: 45, minRotation: 45, autoSkip: false };
    moOpts.plugins.tooltip = { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${fmt(ctx.parsed.y)} případů` } };
    charts.monthly = new Chart($('#chart-monthly'), {
      type: 'bar',
      data: { labels: monthly.map(x => formatMonthLabel(x.month)), datasets: [
        { label: 'CZ', data: monthly.map(x => x.cz), backgroundColor: '#185fa5', borderRadius: 3 },
        { label: 'SK', data: monthly.map(x => x.sk), backgroundColor: '#EF9F27', borderRadius: 3 }
      ]},
      options: moOpts
    });
  }

  // Trend (line) charts — conditional
  const trendLabels = monthlyMetrics.months.map(formatMonthLabel);
  const lineDS = (czData, skData) => ([
    { label: 'CZ', data: czData, borderColor: '#185fa5', backgroundColor: '#185fa5', spanGaps: true, tension: 0.2, borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5 },
    { label: 'SK', data: skData, borderColor: '#EF9F27', backgroundColor: '#EF9F27', spanGaps: true, tension: 0.2, borderWidth: 2, pointRadius: 2.5, pointHoverRadius: 5 }
  ]);
  const trendBase = () => {
    const o = JSON.parse(JSON.stringify(baseOpts));
    o.scales.x.ticks = { font: { size: 10 }, maxRotation: 45, minRotation: 45, autoSkip: false };
    o.interaction = { mode: 'index', intersect: false };
    return o;
  };
  const moneyTrendOpts = () => { const o = trendBase(); o.plugins.tooltip = { callbacks: { label: (c) => c.parsed.y == null ? `${c.dataset.label}: —` : `${c.dataset.label}: ${fmtMoneyAvg(c.parsed.y)}` } }; return o; };
  const kmTrendOpts    = () => { const o = trendBase(); o.plugins.tooltip = { callbacks: { label: (c) => c.parsed.y == null ? `${c.dataset.label}: —` : `${c.dataset.label}: ${dec(c.parsed.y, 1)} km` } }; return o; };
  const daysTrendOpts  = () => { const o = trendBase(); o.plugins.tooltip = { callbacks: { label: (c) => c.parsed.y == null ? `${c.dataset.label}: —` : `${c.dataset.label}: ${dec(c.parsed.y, 2)} dne` } }; return o; };

  if (flags.hasRescue && $('#chart-trend-cost-rescue') && trendLabels.length) {
    charts.trendCostRescue = new Chart($('#chart-trend-cost-rescue'), {
      type: 'line',
      data: { labels: trendLabels, datasets: lineDS(
        monthlyMetrics.rescueCost.cz.map(v => v == null ? null : Math.round(v)),
        monthlyMetrics.rescueCost.sk.map(v => v == null ? null : Math.round(v))) },
      options: moneyTrendOpts()
    });
  }
  if (flags.hasRescue && $('#chart-trend-km') && trendLabels.length) {
    charts.trendKm = new Chart($('#chart-trend-km'), {
      type: 'line',
      data: { labels: trendLabels, datasets: lineDS(
        monthlyMetrics.rescueKm.cz.map(v => v == null ? null : r1(v)),
        monthlyMetrics.rescueKm.sk.map(v => v == null ? null : r1(v))) },
      options: kmTrendOpts()
    });
  }
  if (flags.hasReplacement && $('#chart-trend-cost-repl') && trendLabels.length) {
    charts.trendCostRepl = new Chart($('#chart-trend-cost-repl'), {
      type: 'line',
      data: { labels: trendLabels, datasets: lineDS(
        monthlyMetrics.replCost.cz.map(v => v == null ? null : Math.round(v)),
        monthlyMetrics.replCost.sk.map(v => v == null ? null : Math.round(v))) },
      options: moneyTrendOpts()
    });
  }
  if (flags.hasReplacement && $('#chart-trend-days') && trendLabels.length) {
    charts.trendDays = new Chart($('#chart-trend-days'), {
      type: 'line',
      data: { labels: trendLabels, datasets: lineDS(
        monthlyMetrics.replDays.cz.map(v => v == null ? null : Math.round(v*100)/100),
        monthlyMetrics.replDays.sk.map(v => v == null ? null : Math.round(v*100)/100)) },
      options: daysTrendOpts()
    });
  }
}

function renderCompanyTable(all) {

  const dir = companySort.dir === 'asc' ? 1 : -1;
  const col = companySort.col;
  list.sort((a, b) => {
    if (col === 'name') return dir * a.name.localeCompare(b.name, 'cs');
    return dir * ((a[col] || 0) - (b[col] || 0));

  const totalCount = list.length;
  const limit = companyShowAll ? totalCount : Math.min(30, totalCount);

  $('#company-counter').textContent = `Zobrazeno ${fmt(shown.length)} z ${fmt(totalCount)} firem`;
  const moreBtn = $('#company-show-more');
  if (totalCount > 30) {
    moreBtn.style.display = '';
    moreBtn.textContent = companyShowAll ? 'Zobrazit jen top 30' : `Zobrazit všechny (${fmt(totalCount)})`;

  const ind = (c) => companySort.col === c ? `<span class="sort-ind">${companySort.dir === 'asc' ? '▲' : '▼'}</span>` : '';
  const cls = (c) => companySort.col === c ? 'sorted' : '';
  const colHdr = (key, label, right) => `<th class="${right?'right ':''}${cls(key)}" data-sort="${key}">${label}${ind(key)}</th>`;

  const rowsHtml = shown.map(c => `
    <tr>
      <td class="name" title="${escapeHtml(c.name)}">${escapeHtml(c.name)}</td>
      <td><span class="country-pill ${c.country.toLowerCase()}">${c.country}</span></td>
      <td class="right">${fmt(c.cases)}</td>
      <td class="right">${fmt(c.towingN)}</td>
      <td class="right">${fmt(c.techN)}</td>
      <td class="right">${fmt(c.replN)}</td>
      <td class="right">${fmtMoneyAvg(c.paidAvg)}</td>
      <td class="right">${c.rdN ? dec(c.rdAvg, 1) + ' km' : '—'}</td>
      <td class="right">${c.daysN ? dec(c.daysAvg, 2) : '—'}</td>

  $('#company-table-wrap').innerHTML = `
    <table class="companies-table">

        <th>Země</th>

    const k = th.dataset.sort;
    if (companySort.col === k) companySort.dir = (companySort.dir === 'asc' ? 'desc' : 'asc');
    else { companySort.col = k; companySort.dir = (k === 'name' ? 'asc' : 'desc'); }
    renderCompanyTable(all);
  }));
}

// ---------- Year-to-year ----------
function computeYoY() {
  // Apply VT, Benefit and Status filters (ignore time filter)
  const baseRows = data.filter(r => {
    let t = r[COL.vt]; t = (t == null || String(t).trim() === '') ? '(neuvedeno)' : String(t).trim();
    if (!selectedVT.has(t)) return false;
    let bf = r[COL.benefit]; bf = (bf == null || String(bf).trim() === '') ? '(neuvedeno)' : String(bf).trim();
    if (!selectedBE.has(bf)) return false;
    let s = r[COL.status]; s = (s == null || String(s).trim() === '') ? '(neuvedeno)' : String(s).trim();
    if (!selectedST.has(s)) return false;
    return true;
  });

  // Find years and their months
  const yearMonths = {};
  for (const r of baseRows) {
    const m = String(r[COL.month] || '').trim();
    if (m.length !== 6) continue;
    const y = m.substring(0, 4);
    const mm = m.substring(4, 6);
    if (!yearMonths[y]) yearMonths[y] = new Set();
    yearMonths[y].add(mm);
  }
  const years = Object.keys(yearMonths).sort();
  if (years.length < 2) return null;
  const y1 = years[years.length - 2];
  const y2 = years[years.length - 1];

  const common = [...yearMonths[y1]].filter(mm => yearMonths[y2].has(mm)).sort();
  if (common.length === 0) return null;

  const set1 = new Set(common.map(mm => y1 + mm));
  const set2 = new Set(common.map(mm => y2 + mm));
  const y1Rows = baseRows.filter(r => set1.has(String(r[COL.month] || '').trim()));
  const y2Rows = baseRows.filter(r => set2.has(String(r[COL.month] || '').trim()));

  const hasTowing = selectedBE.has('Towing/Recovery');
  const hasTech = selectedBE.has('Technician attendance');
  const hasReplacement = selectedBE.has('Replacement vehicle');
  if (!hasTowing && !hasTech && !hasReplacement) return null;

  const mkCountry = (country) => {
    const out = {};
    if (hasTowing) out.towing = { y1: computeStats(y1Rows, country, BENEFITS.towing, COL.rd), y2: computeStats(y2Rows, country, BENEFITS.towing, COL.rd) };
    if (hasTech) out.tech = { y1: computeStats(y1Rows, country, BENEFITS.tech, COL.rd), y2: computeStats(y2Rows, country, BENEFITS.tech, COL.rd) };
    if (hasReplacement) out.replacement = { y1: computeStats(y1Rows, country, BENEFITS.replacement, COL.days), y2: computeStats(y2Rows, country, BENEFITS.replacement, COL.days) };
    return out;
  };

  return { years: [y1, y2], commonMonths: common, cz: mkCountry('CZ'), sk: mkCountry('SK') };
}

function computeHeatmap(rows) {
  const country = heatmapCountry === 'CZ' ? 'Czech Republic' : 'Slovakia';
  const subset = rows.filter(r => r[COL.ec] === country);
  const counts = new Map();
  let mapped = 0, unmapped = 0;
  for (const r of subset) {
    let key;
    if (heatmapLevel === 'okres') {
      const o = cityToOkres(r[COL.evCity], country);
      if (o) { key = o; mapped++; }
      else { key = '∅ Ostatní (nepřiřazeno)'; unmapped++; }
    } else {
      const k = normalizeKraj(r[COL.evProvince]);
      if (k) { key = k; mapped++; }
      else { key = '∅ Neznámý kraj'; unmapped++; }
    }
    counts.set(key, (counts.get(key) || 0) + 1);
  }
  const tiles = Array.from(counts.entries())
    .map(([name, count]) => ({ name, count, isOther: name.startsWith('∅') }))
    .sort((a, b) => {
      if (a.isOther !== b.isOther) return a.isOther ? 1 : -1;
      return b.count - a.count;
    });
  return { tiles, total: subset.length, mapped, unmapped };
}

function heatTileBg(ratio, country) {
  // Light background → strong color, by country palette
  const base = country === 'CZ' ? [230, 241, 251] : [250, 238, 218];
  const strong = country === 'CZ' ? [24, 95, 165] : [133, 79, 11];
  const r = Math.round(base[0] + (strong[0] - base[0]) * ratio);
  const g = Math.round(base[1] + (strong[1] - base[1]) * ratio);
  const b = Math.round(base[2] + (strong[2] - base[2]) * ratio);
  return `rgb(${r}, ${g}, ${b})`;
}

function renderHeatmap(filtered) {
  const sec = $('#heatmap-section');
  if (!sec) return;
  const { tiles, total, mapped } = computeHeatmap(filtered);
  const namedTiles = tiles.filter(t => !t.isOther);
  const otherTile = tiles.find(t => t.isOther);
  const max = namedTiles.length ? Math.max(...namedTiles.map(t => t.count), 1) : 1;

  const tilesHtml = tiles.map(t => {
    const pctOfTotal = total ? (t.count / total * 100) : 0;
    const pctStr = pctOfTotal >= 10 ? pctOfTotal.toFixed(1) + ' %' : pctOfTotal.toFixed(2) + ' %';
    if (t.isOther) {
      const cleanName = t.name.replace('∅ ', '');
      return `<div class="okres-tile unmapped">
        <p class="ot-name">${escapeHtml(cleanName)}</p>
        <p class="ot-count">${fmt(t.count)}</p>
        <div class="ot-tip">
          <p class="ot-tip-name">${escapeHtml(cleanName)}</p>
          <div class="ot-tip-row"><span class="lbl">Případů</span><span class="val">${fmt(t.count)}</span></div>
          <div class="ot-tip-row"><span class="lbl">% z ${heatmapCountry}</span><span class="val">${pctStr}</span></div>
        </div>
      </div>`;
    }
    const ratio = Math.min(1, t.count / max);
    const bg = heatTileBg(ratio, heatmapCountry);
    const fg = ratio > 0.55 ? '#fff' : 'var(--text)';
    return `<div class="okres-tile" style="background:${bg};color:${fg};">
      <p class="ot-name">${escapeHtml(t.name)}</p>
      <p class="ot-count">${fmt(t.count)}</p>
      <div class="ot-tip">
        <p class="ot-tip-name">${escapeHtml(t.name)}</p>
        <div class="ot-tip-row"><span class="lbl">Případů</span><span class="val">${fmt(t.count)}</span></div>
        <div class="ot-tip-row"><span class="lbl">% z ${heatmapCountry}</span><span class="val">${pctStr}</span></div>
      </div>
    </div>`;
  }).join('');

  const pct = total ? Math.round((mapped / total) * 100) : 0;
  const levelLabel = heatmapLevel === 'okres' ? 'okres' : 'kraj';
  const summary = total
    ? `${fmt(mapped)} / ${fmt(total)} případů přiřazeno na ${levelLabel} · ${pct}%`
    : 'Žádná data v aktuálním filtru.';
  const countLabel = namedTiles.length === 1 ? (heatmapLevel === 'okres' ? 'okres' : 'kraj')
    : (heatmapLevel === 'okres' ? (namedTiles.length >= 5 ? 'okresů' : 'okresy') : (namedTiles.length >= 5 ? 'krajů' : 'kraje'));

  sec.innerHTML = `
    <div class="heatmap-header">
      <p class="heatmap-title"><i class="ti ti-map-2"></i> Zásahy po ${heatmapLevel === 'okres' ? 'okresech' : 'krajích'}</p>
      <div class="heatmap-tools">
        <button class="preset-btn ${heatmapLevel==='okres'?'active':''}" data-hm-level="okres">Okres</button>
        <button class="preset-btn ${heatmapLevel==='kraj'?'active':''}" data-hm-level="kraj">Kraj</button>
        <span style="width:8px;"></span>
        <button class="preset-btn ${heatmapCountry==='CZ'?'active':''}" data-hm-country="CZ">CZ</button>
        <button class="preset-btn ${heatmapCountry==='SK'?'active':''}" data-hm-country="SK">SK</button>
      </div>
    </div>
    <div class="heatmap-grid">${tilesHtml || '<p style="color:var(--text-tertiary);font-size:12px;margin:0;">Žádná data.</p>'}</div>
    <div class="heatmap-summary">
      <span>${summary}</span>
      <span>${fmt(namedTiles.length)} ${countLabel}</span>
    </div>`;

  $$('#heatmap-section [data-hm-level]').forEach(b => {
    b.onclick = () => { heatmapLevel = b.dataset.hmLevel; renderHeatmap(getFilteredData()); };
  });

function yoyCard(cls, label, stats, years) {
  const rows = [];
  if (stats.towing) rows.push(yoyBenefitRows('Towing / Recovery', stats.towing, 'rd'));
  if (stats.tech) rows.push(yoyBenefitRows('Technician attendance', stats.tech, 'rd'));
  if (stats.replacement) {
    const replTitle = cls === 'sk'
      ? 'Replacement vehicle <span class="vat-tag">vč. DPH</span>'
      : 'Replacement vehicle';

  return `
    <div class="yoy-card ${cls}">

            <th class="right">${years[0]}</th>
            <th class="right">${years[1]}</th>
            <th class="right">Δ</th>
          </tr>
        </thead>
        <tbody>${rows.join('')}</tbody>
      </table>

}

function yoyBenefitRows(title, st, metricKey) {
  const metricLabel = metricKey === 'rd' ? 'Ø Route Distance' : 'Ø Dní zápůjčky';
  const metricFmt = (v) => metricKey === 'rd' ? `${dec(v, 1)} km` : `${dec(v, 2)} dne`;
  return `
    <tr class="divider"><td colspan="4">${title}</td></tr>
    <tr>
      <td>Případů</td>
      <td class="right">${fmt(st.y1.n)}</td>
      <td class="right">${fmt(st.y2.n)}</td>
      <td class="right">${fmtDelta(deltaPct(st.y1.n, st.y2.n))}</td>
    </tr>
    <tr>
      <td>Náklady celkem</td>
      <td class="right">${fmtMoneyTotal(st.y1.paidSum)}</td>
      <td class="right">${fmtMoneyTotal(st.y2.paidSum)}</td>
      <td class="right">${fmtDelta(deltaPct(st.y1.paidSum, st.y2.paidSum))}</td>
    </tr>
    <tr>
      <td>Ø na případ</td>
      <td class="right">${fmtMoneyAvg(st.y1.paidAvg)}</td>
      <td class="right">${fmtMoneyAvg(st.y2.paidAvg)}</td>
      <td class="right">${fmtDelta(deltaPct(st.y1.paidAvg, st.y2.paidAvg))}</td>
    </tr>
    <tr>
      <td>${metricLabel}</td>
      <td class="right">${st.y1.n ? metricFmt(st.y1.metricAvg) : '—'}</td>
      <td class="right">${st.y2.n ? metricFmt(st.y2.metricAvg) : '—'}</td>
      <td class="right">${fmtDelta(deltaPct(st.y1.metricAvg, st.y2.metricAvg))}</td>
    </tr>`;
}

function formatYoYPeriod(commonMonths, years) {
  if (commonMonths.length === 1) {
    const mIdx = parseInt(commonMonths[0], 10) - 1;
    return `${CZ_MONTHS[mIdx]} ${years[0]} vs ${CZ_MONTHS[mIdx]} ${years[1]}`;
  }
  const first = parseInt(commonMonths[0], 10) - 1;
  const last = parseInt(commonMonths[commonMonths.length - 1], 10) - 1;
  return `${CZ_MONTHS[first]}–${CZ_MONTHS[last]} (${years[0]} vs ${years[1]})`;
}

function deltaPct(oldV, newV) {
  if (oldV == null || oldV === 0) return null;
  return ((newV - oldV) / oldV) * 100;
}

function fmtDelta(pct) {
  if (pct == null || isNaN(pct)) return '<span class="delta na">—</span>';
  if (Math.abs(pct) < 0.05) return '<span class="delta zero">±0 %</span>';
  const sign = pct > 0 ? '+' : '';
  const cls = pct > 0 ? 'pos' : 'neg';
  const arrow = pct > 0 ? '▲' : '▼';
  return `<span class="delta ${cls}">${arrow} ${sign}${dec(pct, 1)} %</span>`;
}

// ---------- Export ----------
function dateStamp() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}
function triggerDownload(href, filename) {
  const a = document.createElement('a');
  a.href = href; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}
function showToast(msg) {
  let t = document.querySelector('.export-toast');
  if (!t) { t = document.createElement('div'); t.className = 'export-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2400);
}

const exportBtn = () => $('#btn-export');
const exportMenu = () => $('#export-menu');
document.addEventListener('click', (e) => {
  if (!exportBtn() || !exportMenu()) return;
  if (exportBtn().contains(e.target)) {
    exportMenu().hidden = !exportMenu().hidden;
    return;
  }
  const item = e.target.closest('[data-export]');
  if (item && exportMenu().contains(item)) {
    exportMenu().hidden = true;
    handleExport(item.dataset.export);
    return;
  }
  if (exportMenu() && !exportMenu().hidden) exportMenu().hidden = true;
});

function handleExport(kind) {
  try {
    if (kind === 'data-xlsx') exportFilteredDataXlsx();
    else if (kind === 'pretty-xlsx') exportPrettyXlsx();
    else if (kind === 'report-xlsx') exportReportXlsx();
    else if (kind === 'charts-zip') exportChartsZip();
    else if (kind === 'print') window.print();
  } catch (err) {
    console.error(err);
    alert('Export selhal: ' + err.message);
  }
}

function buildSummarySheet(filtered) {
  const compute = (country) => ({
    towing: computeStats(filtered, country, BENEFITS.towing, COL.rd),
    tech: computeStats(filtered, country, BENEFITS.tech, COL.rd),
    combined: computeStats(filtered, country, BENEFITS.combined, COL.rd),
    replacement: computeStats(filtered, country, BENEFITS.replacement, COL.days)
  });
  const cz = compute('CZ'), sk = compute('SK');
  const out = [
    ['NTW RSA — Souhrnný přehled CZ × SK'],
    ['Vygenerováno', new Date().toLocaleString('cs-CZ')],
    ['Zdroj nákladů', COST_SOURCES[activeCostKey].label],
    [],
    ['Země', 'Benefit', 'Případů', 'Náklady celkem (Kč)', 'Ø na případ (Kč)', 'S vyplněnou částkou', 'Hlavní metrika']
  ];
  const addRow = (country, name, st, metricKey) => {
    let metric = '';
    if (st.n > 0) {
      metric = metricKey === 'rd'
        ? Math.round(st.metricAvg * 10) / 10 + ' km'
        : Math.round(st.metricAvg * 100) / 100 + ' dní';
    }
    out.push([country, name, st.n, Math.round(st.paidSum), Math.round(st.paidAvg), st.paidN, metric]);
  };
  for (const [country, stats] of [['CZ', cz], ['SK', sk]]) {
    addRow(country, 'Towing/Recovery', stats.towing, 'rd');
    addRow(country, 'Technician attendance', stats.tech, 'rd');
    addRow(country, 'Towing + Technician', stats.combined, 'rd');
    addRow(country, country === 'SK' ? 'Replacement vehicle (vč. DPH)' : 'Replacement vehicle', stats.replacement, 'days');
  }
  return out;
}

function buildCompaniesSheet(filtered) {
  const list = computeCompanies(filtered).sort((a, b) => b.cases - a.cases);

}

function buildMonthlySheet(filtered) {
  const vm = visibleMonths();
  const mo = computeMonthly(filtered, vm);
  const mm = computeMonthlyMetrics(filtered, vm);
  const r1f = (v) => v == null ? '' : Math.round(v * 10) / 10;
  const r2f = (v) => v == null ? '' : Math.round(v * 100) / 100;
  const rInt = (v) => v == null ? '' : Math.round(v);
  return mo.map((row, i) => ({
    'Měsíc (YYYYMM)': row.month,
    'CZ případů': row.cz,
    'SK případů': row.sk,
    'CZ Ø náklad Towing+Tech (Kč)': rInt(mm.rescueCost.cz[i]),
    'SK Ø náklad Towing+Tech (Kč)': rInt(mm.rescueCost.sk[i]),
    'CZ Ø km Towing+Tech': r1f(mm.rescueKm.cz[i]),
    'SK Ø km Towing+Tech': r1f(mm.rescueKm.sk[i]),
    'CZ Ø náklad Replacement (Kč)': rInt(mm.replCost.cz[i]),
    'SK Ø náklad Replacement (Kč)': rInt(mm.replCost.sk[i]),
    'CZ Ø dní Replacement': r2f(mm.replDays.cz[i]),
    'SK Ø dní Replacement': r2f(mm.replDays.sk[i])
  }));
}

function buildYoYSheet(yoy) {
  const { years, commonMonths, cz, sk } = yoy;
  const out = [
    ['Year-to-year porovnání'],
    ['Srovnatelné období', formatYoYPeriod(commonMonths, years)],
    [],
    ['Země', 'Benefit', 'Ukazatel', years[0], years[1], 'Δ %']
  ];
  const pctFmt = (p) => (p == null || isNaN(p)) ? '' : Math.round(p * 10) / 10;
  const addBenefit = (country, name, st, metricKey) => {
    out.push([country, name, 'Případů', st.y1.n, st.y2.n, pctFmt(deltaPct(st.y1.n, st.y2.n))]);
    out.push([country, name, 'Náklady celkem (Kč)', Math.round(st.y1.paidSum), Math.round(st.y2.paidSum), pctFmt(deltaPct(st.y1.paidSum, st.y2.paidSum))]);
    out.push([country, name, 'Ø na případ (Kč)', Math.round(st.y1.paidAvg), Math.round(st.y2.paidAvg), pctFmt(deltaPct(st.y1.paidAvg, st.y2.paidAvg))]);
    const v1 = metricKey === 'rd' ? Math.round(st.y1.metricAvg * 10) / 10 : Math.round(st.y1.metricAvg * 100) / 100;
    const v2 = metricKey === 'rd' ? Math.round(st.y2.metricAvg * 10) / 10 : Math.round(st.y2.metricAvg * 100) / 100;
    out.push([country, name, metricKey === 'rd' ? 'Ø Route Distance (km)' : 'Ø dní zápůjčky', v1, v2, pctFmt(deltaPct(st.y1.metricAvg, st.y2.metricAvg))]);
  };
  for (const [country, stats] of [['CZ', cz], ['SK', sk]]) {
    if (stats.towing) addBenefit(country, 'Towing/Recovery', stats.towing, 'rd');
    if (stats.tech) addBenefit(country, 'Technician attendance', stats.tech, 'rd');
    if (stats.replacement) addBenefit(country, country === 'SK' ? 'Replacement vehicle (vč. DPH)' : 'Replacement vehicle', stats.replacement, 'days');
  }
  return out;
}

function buildFilterSheet(filtered) {
  const setOrAll = (set, full, label) => set.size === full.length ? `Vše (${label})` : [...set].join(' | ');

async function exportChartsZip() {
  if (typeof JSZip === 'undefined') { alert('Knihovna JSZip se nepodařilo načíst. Zkontrolujte připojení.'); return; }
  showToast('Sestavuji ZIP s grafy…');
  const zip = new JSZip();
  const list = [
    { id: 'rd', name: 'srovnani_route_distance' },
    { id: 'cost', name: 'srovnani_naklady' },
    { id: 'monthly', name: 'pripady_mesicne' },
    { id: 'trendCostRescue', name: 'trend_naklad_towing_tech' },
    { id: 'trendKm', name: 'trend_km_towing_tech' },
    { id: 'trendCostRepl', name: 'trend_naklad_replacement' },
    { id: 'trendDays', name: 'trend_dni_replacement' }
  ];
  for (const c of list) {
    if (!charts[c.id]) continue;
    const dataUrl = chartToWhitePng(charts[c.id]);
    const base64 = dataUrl.split(',')[1];
    zip.file(`${c.name}.png`, base64, { base64: true });
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  triggerDownload(url, `NTW_RSA_grafy_${dateStamp()}.zip`);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function chartToWhitePng(chart) {
  const c = chart.canvas;
  const tmp = document.createElement('canvas');
  tmp.width = c.width; tmp.height = c.height;
  const ctx = tmp.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, tmp.width, tmp.height);
  ctx.drawImage(c, 0, 0);
  return tmp.toDataURL('image/png');
}
